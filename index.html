<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rhythm Kingdom</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><ellipse cx='16' cy='20' rx='13' ry='8' fill='%23ffee00'/><ellipse cx='16' cy='19' rx='11' ry='6' fill='%23ffdd00'/><ellipse cx='12' cy='18' rx='5' ry='3' fill='%23ffee88'/><ellipse cx='16' cy='7' rx='4' ry='4' fill='%2344aa22'/><ellipse cx='16' cy='6' rx='3' ry='3' fill='%2355cc33'/></svg>">

  <script src="src/levels/level2.js"></script>
