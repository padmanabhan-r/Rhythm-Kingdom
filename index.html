<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rhythm Kingdom</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #0d2318; overflow: hidden; }
    #game-container { position: absolute; inset: 0; background: #0d2318; }
    canvas { display: block; }
  </style>
</head>
<body>
<div id="game-container"></div>

  <!-- Phaser 3 -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>

  <!-- Constants (defines window.RK) -->
  <script src="src/constants.js"></script>

  <!-- Systems -->
  <script src="src/systems/Timeline.js"></script>
  <script src="src/systems/AudioManager.js"></script>
  <script src="src/systems/RhythmClock.js"></script>
  <script src="src/systems/GameFeel.js"></script>

  <!-- Entities -->
  <script src="src/entities/Player.js"></script>
  <script src="src/entities/Enemy.js"></script>
  <script src="src/entities/Coconut.js"></script>

  <!-- Level data -->
  <script src="src/levels/level1.js"></script>
  <script src="src/levels/level2.js"></script>
  <script src="src/levels/level3.js"></script>

  <!-- Scenes -->
  <script src="src/scenes/BootScene.js"></script>
  <script src="src/scenes/MenuScene.js"></script>
  <script src="src/scenes/GameScene.js"></script>
  <script src="src/scenes/UIScene.js"></script>

  <!-- Entry point -->
  <script src="src/main.js"></script>

</body>
</html>
